[tool.pytest.ini_options]
minversion = "8.0"
addopts = [
    "-ra",
    "-q",
    "--cov=app",
    "--cov-report=term-missing",
    "--cov-report=html",
]
testpaths = [
    "tests",
]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
env = [
    "MVP_JWT_SECRET=test_jwt_secret_for_tests_32chars_long",
]

[tool.coverage.run]
source = ["app"]
omit = [
    "*/__main__.py",
    "*/ui/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
