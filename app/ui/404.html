<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%232563eb'/><text x='16' y='23' font-family='Inter,Arial,sans-serif' font-size='20' font-weight='700' fill='white' text-anchor='middle'>B</text></svg>" />
    <title>Страница не найдена — Bond AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        nav {
            padding: 14px 32px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #1e293b;
        }
        nav a { text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .brand-mark {
            width: 30px; height: 30px;
            background: #2563eb; border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 15px; color: #fff;
        }
        .brand-name { font-weight: 700; font-size: 14px; color: #f1f5f9; letter-spacing: -.2px; }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 48px 40px;
            text-align: center;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,.5);
        }
        .card-icon {
            width: 64px; height: 64px;
            background: #1e3a8a; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; margin: 0 auto 24px;
        }
        h1 {
            margin: 0 0 12px;
            font-size: 22px; font-weight: 700;
            color: #f1f5f9; letter-spacing: -.3px;
        }
        p {
            margin: 0 0 10px;
            font-size: 14px; color: #94a3b8; line-height: 1.65;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 24px;
            background: #2563eb; color: #fff;
            text-decoration: none; border-radius: 8px;
            font-size: 14px; font-weight: 600;
            transition: background .15s;
        }
        .back-link:hover { background: #1d4ed8; }
        footer {
            border-top: 1px solid #1e293b;
            padding: 16px 32px;
            display: flex; align-items: center; justify-content: center;
        }
        footer span { font-size: 11px; color: #475569; }
    </style>
</head>
<body>
    <nav>
        <a href="/">
            <div class="brand-mark">B</div>
            <span class="brand-name">Bond AI</span>
        </a>
    </nav>
    <main>
        <div class="card">
            <div class="card-icon">&#128270;</div>
            <h1>Страница не найдена</h1>
            <p>Запрашиваемая страница не существует или была перемещена.</p>
            <p style="font-size: 12px; color: #475569;">Проверьте адрес или вернитесь на главную страницу.</p>
            <a href="/" class="back-link">&#8592; На главную</a>
        </div>
    </main>
    <footer>
        <span>&#169; 2025 Bond AI &middot; Не является инвестиционной рекомендацией</span>
    </footer>
</body>
</html>
